name: Deploy to GitHub Pages

on:
  # Deploy whenever the site changes on the default branch
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions required for the GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for new pushes
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repository (index.html lives at the root)
          path: '.'

      # The Pages deployment API occasionally returns a transient
      # "Deployment failed, try again later." Retry automatically so a
      # hiccup doesn't fail the whole run.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before final retry
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 40

      - name: Deploy to GitHub Pages (attempt 3)
        id: deployment
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
